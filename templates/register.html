{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="/" class="auth-logo-text">Ruta Compartida</a>
      <p>Viajá seguro, viajá acompañado</p>
    </div>

    <h1 class="auth-title">Creá tu cuenta</h1>
    <p class="auth-subtitle">Es gratis y solo toma un minuto</p>

    <form method="POST" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="auth-row">
        <div class="auth-field">
          <label class="auth-label">Nombre</label>
          <input type="text" name="nombre" class="auth-input" placeholder="Juan" required>
        </div>
        <div class="auth-field">
          <label class="auth-label">Apellido</label>
          <input type="text" name="apellido" class="auth-input" placeholder="García" required>
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-label">Teléfono</label>
        <input type="text" name="telefono" class="auth-input" placeholder="Ej: 3571 123456" required>
      </div>

      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input type="email" name="email" class="auth-input" placeholder="tu@email.com" required>
      </div>

      <div class="auth-field">
        <label class="auth-label">Contraseña</label>
        <div class="input-password-wrap">
          <input type="password" id="reg-pwd" name="password" class="auth-input" placeholder="Mínimo 6 caracteres" required oninput="updateStrength(this.value)">
          <button type="button" class="toggle-pwd" onclick="togglePwd('reg-pwd', this)" tabindex="-1" aria-label="Mostrar contraseña">👁</button>
        </div>
        <div class="pwd-strength-bar">
          <div class="pwd-strength-fill" id="pwd-fill"></div>
        </div>
      </div>

      <button type="submit" class="btn-auth">Crear cuenta →</button>

      <p class="auth-terms">
        Al registrarte aceptás nuestros
        <a href="/terminos">Términos y Condiciones</a>
      </p>
    </form>

    <div class="auth-divider"><span>o</span></div>

    <div class="auth-footer">
      ¿Ya tenés cuenta? <a href="/login">Iniciá sesión</a>
    </div>

  </div>
</div>

<script>
function togglePwd(inputId, btn) {
  var input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}
function updateStrength(val) {
  var fill = document.getElementById('pwd-fill');
  if (!fill) return;
  var len = val.length;
  var pct = 0; var color = '#E5E7EB';
  if (len >= 4)  { pct = 33; color = '#FCA5A5'; }
  if (len >= 7)  { pct = 66; color = '#FCD34D'; }
  if (len >= 10) { pct = 100; color = '#34D399'; }
  fill.style.width = pct + '%';
  fill.style.background = color;
}
</script>
{% endblock %}
