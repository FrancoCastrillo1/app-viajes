{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="/" class="auth-logo-text">Ruta Compartida</a>
      <p>Viajá seguro, viajá acompañado</p>
    </div>

    <h1 class="auth-title">Bienvenido de nuevo</h1>
    <p class="auth-subtitle">Ingresá a tu cuenta para ver tus viajes</p>

    <form method="POST" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input type="email" name="email" class="auth-input" placeholder="tu@email.com" required>
      </div>
      <div class="auth-field">
        <label class="auth-label">Contraseña</label>
        <div class="input-password-wrap">
          <input type="password" id="login-pwd" name="password" class="auth-input" placeholder="••••••••" required>
          <button type="button" class="toggle-pwd" onclick="togglePwd('login-pwd', this)" tabindex="-1" aria-label="Mostrar contraseña">👁</button>
        </div>
      </div>
      <div class="auth-forgot">
        <a href="/recuperar">¿Olvidaste tu contraseña?</a>
      </div>
      <button type="submit" class="btn-auth">Ingresar →</button>
    </form>

    <div class="auth-divider"><span>o</span></div>

    <div class="auth-footer">
      ¿No tenés cuenta? <a href="/register">Registrate gratis</a>
    </div>

  </div>
</div>

<script>
function togglePwd(inputId, btn) {
  var input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}
</script>
{% endblock %}
