{% extends "base.html" %}

{% block content %}
<h2>Crear Viaje</h2>
<form method="POST">   
    <label>Origen</label>
        <select name="origen" required>
            <option value="" disabled selected>Seleccioná origen</option>
            <option value="Leones">Leones</option>
            <option value="Marcos Juarez">Marcos Juarez</option>
            <option value="Rosario">Rosario</option>
            <option value="Cordoba">Cordoba</option>
            <option value="Villa Maria">Villa Maria</option>
            <option value="Bell ville">Bell ville</option>
        </select>

        <label>Destino</label>
        <select name="destino" required>
            <option value="" disabled selected>Seleccioná destino</option>
            <option value="Leones">Leones</option>
            <option value="Marcos Juarez">Marcos Juarez</option>
            <option value="Rosario">Rosario</option>
            <option value="Cordoba">Cordoba</option>
            <option value="Villa Maria">Villa Maria</option>
            <option value="Bell ville">Bell ville</option>
        </select>
    
    <input type="text" name="encuentro" placeholder="Lugar de Encuentro" required>
    <input type="date" name="fecha" min="{{ fecha_hoy }}">
    <input type="time" name="hora" required>
    <input type="number" name="lugares" placeholder="Lugares disponibles" required>
    <input type="number" step="0.01" name="precio" placeholder="Precio por persona" required>
    <button type="submit">Publicar</button>
</form>
{% endblock %}
